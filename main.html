
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="origin">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="stylesheet.css">
    <title>Ship Tracker</title>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="javascript.js" defer></script>
</head>
<body>
    <h1>Real-Time Ship Tracker</h1>
    <div class="app-shell">
        <div id="map" class="map"></div>
        <aside id="sidebar" class="sidebar" aria-hidden="true">
            <button id="close-sidebar" aria-label="Close ship details sidebar">×</button>
            <div class="sidebar-header">
                <h2>Ship details</h2>
                <p>Select a ship marker to view additional information.</p>
                <div id="selected-indicator" class="selected-indicator">No ship selected</div>
            </div>
            <div id="ship-image-container" class="ship-image-container">
                <img id="ship-image" class="ship-image" src="" alt="Ship image" hidden />
                <div id="ship-image-caption" class="ship-image-caption">No image available yet.</div>
            </div>
            <div class="tabs">
                <button class="tab-button active" data-tab="basic">Basic Info</button>
                <button class="tab-button" data-tab="navigation">Navigation</button>
                <button class="tab-button" data-tab="technical">Technical</button>
            </div>
            <div id="ship-details" class="ship-details">
                <div class="tab-content active" id="basic-tab">
                    <p>No ship selected yet.</p>
                </div>
                <div class="tab-content" id="navigation-tab">
                    <p>No ship selected yet.</p>
                </div>
                <div class="tab-content" id="technical-tab">
                    <p>No ship selected yet.</p>
                </div>
            </div>
        </aside>
        <div id="locate-button" class="locate-button" title="Show my location">📍 Show my location</div>
    </div>
</body>
</html>
